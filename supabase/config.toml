# Supabase Local Development Configuration
# See: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[analytics]
enabled = false

# Edge Functions
[functions]

[functions.waitlist-signup]
verify_jwt = false

[functions.waitlist-confirm]
verify_jwt = false

[functions.portal-verify]
verify_jwt = false

[functions.portal-action]
verify_jwt = false

[functions.checkout-create]
verify_jwt = false

[functions.checkout-pay-booking]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.contact-form]
verify_jwt = false
