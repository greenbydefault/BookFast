<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Forgot Password - BookFast</title>
    <link rel="stylesheet" href="./src/styles/variables.css">
    <link rel="stylesheet" href="./src/styles/base.css">
    <link rel="stylesheet" href="./src/styles/auth.css">
</head>

<body class="auth-page">
    <main class="auth-container auth-container--compact">
        <div class="auth-brand auth-brand--centered">
            <img src="/Logo/logo-bookfast.svg" alt="BookFast" class="auth-brand-icon" width="24" height="24">
        </div>

        <h1 class="auth-title auth-title--centered">Passwort<br>zurücksetzen</h1>
        <p class="auth-subtitle auth-subtitle--centered">
            Gib deine E-Mail ein und wir senden dir einen Link<br>zum Zurücksetzen.
        </p>

        <div class="auth-card auth-card--compact">
            <form id="forgotPasswordForm" class="auth-form">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" required placeholder="Type your email" autocomplete="email">
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">Reset-Link senden</button>

                <div id="errorMessage" class="message-container error-message"></div>
                <div id="successMessage" class="message-container success-message"></div>

                <p class="auth-switch-text">
                    Passwort wieder eingefallen?
                    <a href="/login.html">Zum Login</a>
                </p>
            </form>
        </div>

        <p class="auth-legal-note">
            Weitere Infos findest du in den
            <a href="/datenschutzbestimmungen.html">Datenschutzbestimmungen</a> und den
            <a href="/private-policies.html">Private Policies</a>.
        </p>
    </main>

    <script type="module" src="/src/forgot-password.js"></script>
</body>

</html>
