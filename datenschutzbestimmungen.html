<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Datenschutzbestimmungen - BookFast</title>
    <link rel="stylesheet" href="./src/styles/variables.css">
    <link rel="stylesheet" href="./src/styles/base.css">
    <link rel="stylesheet" href="./src/styles/auth.css">
</head>

<body class="auth-page">
    <main class="auth-container auth-container--compact">
        <div class="auth-brand auth-brand--centered">
            <img src="/Logo/logo-bookfast.svg" alt="BookFast" class="auth-brand-icon" width="24" height="24">
        </div>

        <h1 class="auth-title auth-title--centered">Datenschutzbestimmungen</h1>
        <p class="auth-subtitle auth-subtitle--centered">
            Platzhalterseite. Der finale Rechtstext wird hier in einem nächsten Schritt eingefuegt.
        </p>

        <div class="auth-card auth-card--compact">
            <div class="auth-form">
                <p class="auth-switch-text">
                    Diese Seite dient aktuell als Platzhalter fuer die Datenschutzbestimmungen von BookFast.
                </p>
                <p class="auth-switch-text">
                    <a href="/login.html">Zurueck zum Login</a>
                </p>
            </div>
        </div>
    </main>
</body>

</html>
