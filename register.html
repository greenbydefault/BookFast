<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Logo/logo-bookfast.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Register - BookFast</title>
    <link rel="stylesheet" href="./src/styles/variables.css">
    <link rel="stylesheet" href="./src/styles/base.css">
    <link rel="stylesheet" href="./src/styles/auth.css">
</head>

<body class="auth-page">
    <main class="auth-container auth-container--compact">
        <div class="auth-brand auth-brand--centered">
            <img src="/Logo/logo-bookfast.svg" alt="BookFast" class="auth-brand-icon" width="24" height="24">
        </div>

        <h1 class="auth-title auth-title--centered">Erstelle deinen<br>BookFast Account</h1>
        <p class="auth-subtitle auth-subtitle--centered">
            Starte in wenigen Schritten mit deiner E-Mail<br>oder deinem Google-Account.
        </p>

        <div class="auth-card auth-card--compact">
            <form id="registerForm" class="auth-form">
                <!-- Step 1: Social & Email -->
                <div id="step1" class="step-visible">
                    <button type="button" class="btn-social" id="googleBtn">
                        <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
                            <g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)">
                                <path fill="#4285F4"
                                    d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z" />
                                <path fill="#34A853"
                                    d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z" />
                                <path fill="#FBBC05"
                                    d="M -21.484 53.529 C -21.734 52.769 -21.864 51.959 -21.864 51.129 C -21.864 50.299 -21.734 49.489 -21.484 48.729 L -21.484 45.639 L -25.464 45.639 C -26.274 47.249 -26.734 49.069 -26.734 51.129 C -26.734 53.189 -26.274 55.009 -25.464 56.619 L -21.484 53.529 Z" />
                                <path fill="#EA4335"
                                    d="M -14.754 43.769 C -12.984 43.769 -11.424 44.369 -10.174 45.579 L -6.714 42.119 C -8.804 40.169 -11.514 38.989 -14.754 38.989 C -19.444 38.989 -23.494 41.689 -25.464 45.609 L -21.484 48.699 C -20.534 45.849 -17.884 43.769 -14.754 43.769 Z" />
                            </g>
                        </svg>
                        Mit Google Anmelden
                    </button>

                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="Type your email"
                            autocomplete="email">
                        <!-- Removed required here to manually validate before step 2 -->
                    </div>

                    <button type="button" class="btn-primary" id="continueBtn">Weiter mit E-Mail</button>
                </div>

                <!-- Step 2: Details & Password -->
                <div id="step2" class="step-hidden">
                    <div class="form-group">
                        <label for="fullName" class="form-label">Vollständiger Name</label>
                        <input type="text" id="fullName" class="form-input" placeholder="John Doe" autocomplete="name">
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Passwort</label>
                        <div class="auth-password-field">
                            <input type="password" id="password" class="form-input form-input--with-icon" placeholder="••••••••"
                                autocomplete="new-password">
                            <button
                                type="button"
                                id="passwordToggleBtn"
                                class="auth-password-toggle"
                                aria-label="Passwort anzeigen"
                                aria-pressed="false">
                                <svg class="auth-password-toggle-icon" width="16" height="16" aria-hidden="true">
                                    <use id="passwordToggleIconUse" href="#icon-eye-closed"></use>
                                </svg>
                            </button>
                        </div>
                        <div id="passwordRequirements" class="password-requirements password-requirements--hidden" aria-live="polite">
                            <span class="password-requirements__text"></span>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" id="submitBtn">Account erstellen</button>
                    <div class="auth-back-row">
                        <button type="button" class="auth-text-link" id="backBtn">Zurück</button>
                    </div>
                </div>

                <div id="errorMessage" class="message-container error-message"></div>
                <div id="successMessage" class="message-container success-message"></div>

                <p class="auth-switch-text">
                    Bereits registriert?
                    <a href="/login.html">Hier einloggen</a>
                </p>
            </form>
        </div>

        <p class="auth-legal-note">
            Mit der Registrierung stimmst du den
            <a href="/datenschutzbestimmungen.html">Datenschutzbestimmungen</a> und den
            <a href="/private-policies.html">Private Policies</a> zu.
        </p>
    </main>

    <script type="module" src="/src/register.js"></script>
</body>

</html>
