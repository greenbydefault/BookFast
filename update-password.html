<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Logo/favicon.png" sizes="32x32" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Neues Passwort setzen - BookFast</title>
    <link rel="stylesheet" href="./src/styles/variables.css">
    <link rel="stylesheet" href="./src/styles/base.css">
    <link rel="stylesheet" href="./src/styles/auth.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-brand">
                <a href="/" class="auth-logo">BookFast</a>
            </div>

            <h1 class="auth-title">Neues Passwort setzen</h1>
            <p class="auth-subtitle">Gib dein neues Passwort unten ein</p>

            <form id="updatePasswordForm" class="auth-form">
                <div class="form-group">
                    <label for="password" class="form-label">Neues Passwort</label>
                    <input type="password" id="password" class="form-input" required placeholder="••••••••"
                        autocomplete="new-password">
                    <div id="passwordRequirements" class="password-requirements password-requirements--hidden" aria-live="polite">
                        <span class="password-requirements__text"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Passwort bestätigen</label>
                    <input type="password" id="confirmPassword" class="form-input" required placeholder="••••••••"
                        autocomplete="new-password">
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">Passwort speichern</button>

                <div id="errorMessage" class="message-container error-message"></div>
                <div id="successMessage" class="message-container success-message"></div>
            </form>

            <div class="auth-footer">
                <span class="auth-link">
                    <a href="/login.html">Zum Login</a>
                </span>
            </div>
        </div>
    </div>

    <script type="module" src="/src/update-password.js"></script>
</body>

</html>
